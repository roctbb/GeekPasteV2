{% extends "base.html" %}
{% block content %}

<div class="page-head">
    <div>
        <h4 class="page-head-title">{{ 'Редактирование задачи #' ~ task.id if task else 'Новая задача' }}</h4>
        <div class="page-head-meta">Настройка условий проверки и параметров задачи</div>
    </div>
    <div class="page-head-actions">
        <a href="{{ next_url }}" class="btn btn-sm btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> К списку задач
        </a>
    </div>
</div>

<div class="card flat-card shadow-soft">
    <div class="card-body">
        <form method="POST" action="{{ ('/tasks/' ~ task.id) if task else '/tasks' }}">
            <input type="hidden" name="next" value="{{ next_url }}">

            <div class="row g-2 mb-2">
                <div class="col-sm-3">
                    <label class="form-label">ID</label>
                    <input type="number" name="id" class="form-control form-control-sm" value="{{ task.id if task else '' }}" placeholder="авто">
                </div>
                <div class="col-sm-9">
                    <label class="form-label">Название</label>
                    <input type="text" name="name" class="form-control form-control-sm" value="{{ task.name or '' if task else '' }}">
                </div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-sm-4">
                    <label class="form-label">Язык</label>
                    <select name="lang" class="form-select form-select-sm">
                        <option value="">—</option>
                        {% for l in langs + ['zip', 'ipynb', 'github'] %}
                            <option value="{{ l }}" {{ 'selected' if task and task.lang == l else '' }}>{{ l }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-sm-4">
                    <label class="form-label">Баллы</label>
                    <input type="number" name="points" class="form-control form-control-sm" value="{{ task.points if task and task.points is not none else '' }}">
                </div>
                <div class="col-sm-4">
                    <label class="form-label">Тип проверки</label>
                    <select name="check_type" class="form-select form-select-sm">
                        {% for ct in ['tests', 'gpt'] %}
                            <option value="{{ ct }}" {{ 'selected' if task and task.check_type == ct else '' }}>{{ ct }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-sm-7">
                    <label class="form-label">GPT модель</label>
                    <input type="text" name="gpt_model" class="form-control form-control-sm" value="{{ task.gpt_model or '' if task else '' }}">
                </div>
                <div class="col-sm-5">
                    <label class="form-label">GPT лимит/час</label>
                    <input type="number" name="gpt_rate_limit" class="form-control form-control-sm" value="{{ task.gpt_rate_limit if task and task.gpt_rate_limit is not none else '' }}" placeholder="по умолч.">
                </div>
            </div>

            <div class="row g-2 mb-2">
                <div class="col-12">
                    <div class="form-check">
                        <input type="checkbox" name="bypass_similarity_check" class="form-check-input" id="bypass" {{ 'checked' if task and task.bypass_similarity_check else '' }}>
                        <label class="form-check-label" for="bypass">Пропуск проверки на списывание</label>
                    </div>
                </div>
                {% if task %}
                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox" name="mass_recheck" class="form-check-input" id="mass_recheck">
                            <label class="form-check-label" for="mass_recheck">После сохранения запустить массовую перепроверку</label>
                        </div>
                    </div>
                {% endif %}
            </div>

            <div class="mb-2">
                <label class="form-label">Текст задачи (Markdown)</label>
                <textarea name="text" class="form-control form-control-sm" rows="10">{{ task.text or '' if task else '' }}</textarea>
            </div>

            <button class="btn btn-sm btn-primary">{{ 'Сохранить' if task else 'Создать' }}</button>
            <a href="{{ next_url }}" class="btn btn-sm btn-secondary">Отмена</a>
        </form>
    </div>
</div>

{% endblock %}
